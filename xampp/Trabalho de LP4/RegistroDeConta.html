<!DOCTYPE html>
<html lang="en">
<head>
    <title>RegistroDeConta</title>
    <script src="jQuery.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style media="screen">
      *,
*:before,
*:after{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
body{
    background-color: #080710;
}
.background{
    width: 430px;
    height: 520px;
    position: absolute;
    transform: translate(-50%,-50%);
    left: 50%;
    top: 50%;
}
.background .shape{
    height: 200px;
    width: 200px;
    position: absolute;
    border-radius: 50%;
}
.shape:first-child{
    background: linear-gradient(
        #1845ad,
        #23a2f6
    );
    left: -80px;
    top: -80px;
}
.shape:last-child{
    background: linear-gradient(
        to right,
        #ff512f,
        #f09819
    );
    right: -30px;
    bottom: -80px;
}
form{
    height: 520px;
    width: 400px;
    background-color: rgba(255,255,255,0.13);
    position: absolute;
    transform: translate(-50%,-50%);
    top: 50%;
    left: 50%;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(8,7,16,0.6);
    padding: 50px 35px;
}
form *{
    font-family: 'Poppins',sans-serif;
    color: #ffffff;
    letter-spacing: 0.5px;
    outline: none;
    border: none;
}
form h3{
    font-size: 32px;
    font-weight: 500;
    line-height: 40px;
    text-align: center;
}

label{
    display: block;
    margin-top: 30px;
    font-size: 16px;
    font-weight: 500;
}
input{
    display: block;
    height: 40px;
    width: 100%;
    background-color: rgba(255,255,255,0.07);
    border-radius: 3px;
    padding: 0 10px;
    margin-top: 8px;
    font-size: 14px;
    font-weight: 300;
}
::placeholder{
    color: #e5e5e5;
}
button{
    margin-top: 50px;
    width: 100%;
    background-color: #ffffff;
    color: #080710;
    padding: 15px 0;
    font-size: 18px;
    font-weight: 600;
    border-radius: 5px;
    cursor: pointer;
}
.social{
  margin-top: 30px;
  display: flex;
}
.social div{
  background: red;
  width: 150px;
  border-radius: 3px;
  padding: 5px 10px 10px 5px;
  background-color: rgba(255,255,255,0.27);
  color: #eaf0fb;
  text-align: center;
}
.social div:hover{
  background-color: rgba(255,255,255,0.47);
}
.social .fb{
  margin-left: 25px;
}
.social i{
  margin-right: 4px;
}

    </style>
</head>
<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <form>
        <h3>Registro de Conta</h3>

        <label for="username">Nome</label>
        <input type="text" placeholder="Nome" name="nome" id="nome">
        <label for="Name">CPF</label>
        <input type="text" placeholder="CPF" name="cpf" id="cpf">
        <label for="password">Senha</label>
        <input type="text" placeholder="Senha" name="senha" id="senha">
        <button type="button" onclick="Registrar()">Registrar</button>
        <button type="button" onclick="window.location.href = 'http://localhost/Trabalho%20de%20LP4/Login.html'">Voltar</button>
    </form>
</body>
</html>
<script>
    function Registrar()
    {  
        nome=document.getElementById("nome").value;  
        cpf=document.getElementById("cpf") .value;
        senha=document.getElementById("senha").value;

          if(document.getElementById("nome").value<1)
          {
            alert("Informe o nome.");
          }
          else if(document.getElementById("cpf").value<1)
          {
            alert("Informe o cpf.");
          }
          else if(document.getElementById("senha").value<1)
          {
            alert("Informe a senha.");
          }
          else
          {
        $.ajax
    ({
        url:'RegistroDeConta.php',
        method:'post',
        data:{'nome':nome, 'cpf':cpf, 'senha':senha}
    }).done(function (echo)
    {
        alert(echo);
    })
    }}
</script>
